<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #c3c4c6;
            font-family: Arial, sans-serif;
        }

        .card {
            max-width: 650px;
            margin: auto;
            background: #fff;
            border-radius: 18px;
        }

        .header {
            background: linear-gradient(135deg, #ab3752, #ff4b2b);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .body {
            padding: 30px 22px;
            text-align: center;
        }

        .movie {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #222;
        }

        .booking {
            display: inline-block;
            background: #ff416c;
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 25px;
        }

    
        .details {
            width: 100%;
            background: #f5f5f5;
            border-radius: 12px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .details td {
            padding: 12px 14px;
            font-size: 15px;
        }

        .label {
            width: 40%;
            text-align: left;
            font-weight: 600;
            color: #666;
        }

        .value {
            width: 60%;
            text-align: right;
            font-weight: bold;
            color: #222;
        }

        .footer {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #777;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        .footer strong {
            color: #ff416c;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="header">
            <h2>🎬 Movie Ticket</h2>
            <p>Your booking has been confirmed</p>
        </div>

        <div class="body">

            <div class="movie">#{movie}</div>

            <div class="booking">
                Booking ID: #{transactionId}
            </div>

            <table class="details">

                <tr>
                    <td class="label">👤 Name</td>
                    <td class="value">#{name}</td>
                </tr>

                <tr>
                    <td class="label">🏢 Theatre</td>
                    <td class="value">#{theatre}</td>
                </tr>

                <tr>
                    <td class="label">📅 Date</td>
                    <td class="value">#{date}</td>
                </tr>

                <tr>
                    <td class="label">⏰ Time</td>
                    <td class="value">#{time}</td>
                </tr>

                <tr>
                    <td class="label">💺 Seats</td>
                    <td class="value">#{seats}</td>
                </tr>

                <tr>
                    <td class="label">💳 Amount</td>
                    <td class="value">₹#{amount}</td>
                </tr>

            </table>

        </div>

        <div class="footer">
            <p>🍿 Enjoy your movie!</p>
            <p>Thank you for booking with <strong>Book My Cinema</strong></p>
        </div>

    </div>

</body>

</html>
